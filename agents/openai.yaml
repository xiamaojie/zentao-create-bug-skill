interface:
  display_name: "禅道提 Bug"
  short_description: "按项目名或产品名创建并校验禅道 Bug，适配中文自然语言触发"
  default_prompt: "当用户要求“帮我提 bug”“创建禅道 bug”“给某个项目提 bug”或“给某个产品提 bug”时，使用此技能。先解析项目、产品、指派人和现象信息，再补全默认字段。项目/产品检索优先走原始接口，若过滤参数不生效则回退到原始全量分页确认准确落点，并允许对英文简称做前两个单词一致的保守模糊匹配。提交前将 [现象]/[复现步骤]/[期望结果]/[实际结果] 规范化拆段，并把 JSON 配置整理为多行缩进。若用户提供了图片路径或附件路径，必须使用双策略附件上传：先走支持 `attachmentPaths` 或 multipart 的创建入口；若创建成功但附件为空，或创建时上传失败，则在拿到 `bugID` 后立即执行创建后补传，不得直接退回普通 `/bugs` 创建接口，除非当前运行时明确两种自动上传策略都不支持。创建完成后，必须把 `getBugDetail(files)` 作为附件最终校验依据：只有 `files` 非空且能对应到本次附件名，才允许对用户说附件上传成功。调用 ZenTao MCP 创建 Bug 后，校验真实落点、附件上传结果与可见性，并返回 Bug 链接。"
